<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MiniBlend - Liên hệ</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="container nav-wrap">
        <a class="brand" href="index.html"><span class="brand-dot"></span><span>MiniBlend</span></a>
        <nav class="nav-menu">
          <a href="index.html">Trang chủ</a>
          <a href="gioi-thieu.html">Giới thiệu</a>
          <a href="chinh-sach.html">Chính sách</a>
        </nav>
      </div>
    </header>

    <main class="section">
      <div class="container">
        <h1>Trang liên hệ</h1>
        <p class="section-intro">
          Đội ngũ MiniBlend luôn sẵn sàng hỗ trợ tư vấn sản phẩm, kiểm tra đơn hàng và tiếp nhận
          phản hồi từ khách hàng.
        </p>
        <div class="support-grid">
          <article class="support-card">
            <h3>Hotline</h3>
            <p>0900 000 999</p>
          </article>
          <article class="support-card">
            <h3>Email</h3>
            <p>support@miniblend.vn</p>
          </article>
          <article class="support-card">
            <h3>Địa chỉ</h3>
            <p>Ninh Bình, Việt Nam</p>
          </article>
        </div>

        <section class="section">
          <h2>Gửi yêu cầu nhanh</h2>
          <form class="order-form">
            <div class="form-grid">
              <label>Họ và tên<input type="text" required /></label>
              <label>Số điện thoại<input type="tel" required /></label>
              <label>Email<input type="email" /></label>
              <label>Chủ đề
                <select>
                  <option>Tư vấn sản phẩm</option>
                  <option>Hỗ trợ đơn hàng</option>
                  <option>Bảo hành/đổi trả</option>
                </select>
              </label>
            </div>
            <label>Nội dung<textarea rows="4" placeholder="Nhập nội dung cần hỗ trợ..."></textarea></label>
            <button class="btn btn-primary" type="submit">Gửi liên hệ</button>
          </form>
        </section>
      </div>
    </main>
  </body>
</html>
