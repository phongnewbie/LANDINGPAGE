<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Đăng nhập - MiniBlend</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
    <style>
      .auth-page {
        padding: 52px 0 64px;
      }
      .auth-card {
        max-width: 560px;
        margin: 0 auto;
        background: #fff;
        border: 1px solid var(--line);
        border-radius: 18px;
        padding: 22px;
        box-shadow: var(--shadow);
      }
      .auth-card p {
        margin: 0 0 14px;
        color: var(--muted);
      }
      .auth-form {
        display: grid;
        gap: 12px;
      }
      .auth-form label {
        display: grid;
        gap: 6px;
        color: #2f4266;
        font-weight: 600;
      }
      .auth-form input {
        border-radius: 12px;
        border: 1px solid #cfe0ff;
        background: #fff;
        padding: 11px 12px;
        font: inherit;
      }
      .auth-form input:focus {
        outline: 2px solid rgba(42, 127, 255, 0.2);
        border-color: #2a7fff;
      }
      .auth-note {
        margin-top: 12px;
        color: var(--muted);
      }
      .auth-note a {
        color: #1d5ee1;
        text-decoration: none;
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <header class="site-header">
      <div class="container nav-wrap">
        <a class="brand" href="index.html">
          <img class="brand-logo" src="IMG/Picture19.png" alt="MiniBlend logo" />
          <span style="color: green; font-weight: lighter">MiniBlend</span>
        </a>
        <div class="nav-actions">
          <a class="btn btn-ghost nav-auth-btn" href="index.html">Về trang chủ</a>
          <a class="btn btn-primary nav-auth-btn" href="dang-ky.html">Sang đăng ký</a>
        </div>
      </div>
    </header>
    <main class="auth-page">
      <div class="container">
        <section class="auth-card">
          <h1>Đăng nhập</h1>
          <p>Đăng nhập để theo dõi đơn hàng và nhận ưu đãi dành cho thành viên MiniBlend.</p>
          <form class="auth-form">
            <label>
              Email hoặc số điện thoại
              <input type="text" name="login-id" placeholder="Nhập email hoặc số điện thoại" required />
            </label>
            <label>
              Mật khẩu
              <input type="password" name="login-password" placeholder="Nhập mật khẩu" required />
            </label>
            <button class="btn btn-primary" type="submit">Đăng nhập</button>
          </form>
          <p class="auth-note">Chưa có tài khoản? <a href="dang-ky.html">Đăng ký ngay</a></p>
        </section>
      </div>
    </main>
  </body>
</html>
